<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'" />
  <title>桌面 TODO</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="panel">
    <!-- 顶栏：拖动区 + 控件 -->
    <header id="titlebar">
      <span id="title">待办</span>
      <div id="controls">
        <input type="range" id="opacity" min="0.25" max="1" step="0.05" title="背景透明度" />
        <button id="autostart" class="icon-btn" title="开机自启动">⏻</button>
        <button id="min" class="icon-btn" title="最小化">—</button>
        <button id="close" class="icon-btn" title="关闭">✕</button>
      </div>
    </header>

    <!-- 输入框 -->
    <div id="add-row">
      <input type="text" id="new-todo" placeholder="添加任务，回车确认…" maxlength="200" />
      <button id="add-btn" title="添加">＋</button>
    </div>

    <!-- 任务列表 -->
    <ul id="list"></ul>
    <div id="empty" class="hidden">还没有任务，加一条吧 ✦</div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
